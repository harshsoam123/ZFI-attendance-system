<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Forgot Password | AttendPay</title>
<link rel="stylesheet" href="css/style.css" />
<link rel="stylesheet" href="css/responsive.css" />
</head>
<body>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-mark">ZFI</div>
      <h1>Reset your password</h1>
      <p>Enter your admin email and we'll send you a reset link.</p>
    </div>

    <form id="forgot-form">
      <div class="form-group">
        <label for="forgot-email">Email Address</label>
        <input class="form-control" type="email" id="forgot-email" placeholder="admin@company.com" required />
      </div>
      <p id="forgot-msg" class="form-hint"></p>
      <button class="btn btn-primary btn-block" type="submit">Send Reset Link</button>
      <div style="text-align:center; margin-top:16px;">
        <a class="link-primary" href="index.html">&larr; Back to login</a>
      </div>
    </form>
  </div>
</div>

<script type="module" src="js/auth.js"></script>
</body>
</html>
